import * as THREE from 'three';

import * as THREEVRM from '@pixiv/three-vrm';

import { convertBVHToVRMAnimation } from './libs/convertBVHToVRMAnimation.js';

// ─── Patch MToon shader (getShadow compat with r176) ──
function patchShaderMaterial(mat) {
  if (!mat || mat._shadowPatched) return;
  const origCb = mat.onBeforeCompile;
  mat.onBeforeCompile = function(shader) {
    if (origCb) origCb.call(this, shader);
    shader.fragmentShader = shader.fragmentShader.replace(
      /getShadow\s*\([^)]+\)\s*/g, '1.0'
    );
  };
  mat._shadowPatched = true;
}

// ─── Config ──────────────────────────────────────────
const VMD_FPS = 30;
const cfg = { modelPath: './models/猫女郎.vrm' };
const dances = {
  jiuzui: {
    title: '酒醉的蝴蝶',
    vmdPath: './vmd/兰若酒醉的蝴蝶mmd数据.vmd',
    audioPath: './audio/酒醉的蝴蝶音频.wav',
  },
  // Copied verbatim from mmd-viewer-mobile's default dance pairing.
  wavefile: {
    title: '默认舞蹈（wavefile）',
    vmdPath: './vmd/default_wavefile_dance.vmd',
    audioPath: './audio/default_wavefile_music.mp3',
    // Source assistance transfers the solved MMD limb pose. Keep the target
    // planted; copying MMD stage translation into this scaled VRM caused large
    // locomotion drift rather than body-weight motion.
    sourceAssist: true,
    retarget: { lockHipsTranslation: true, armCorrection: 'xpi', fingerCorrection: 'ypi', includeHipsTranslation: false },
  },
};
let selectedDanceKey = 'jiuzui';

// ─── DOM ─────────────────────────────────────────────
const loadingEl = document.getElementById('loading');
const progressFill = document.getElementById('progress-fill');
const statusText = document.getElementById('status-text');
const btnPlay = document.getElementById('btnPlay');
const danceSelect = document.getElementById('danceSelect');
const infoEl = document.getElementById('info');
const timeDisplay = document.getElementById('timeDisplay');

function setProgress(pct, msg) {
  progressFill.style.width = Math.min(pct, 100) + '%';
  if (msg) statusText.textContent = msg;
}

// ─── Bone Mapping (SystemAnimatorOnline) ──────────────
const boneMapMMDToVRM = {
  // 此 VMD 的实际根运动在「グルーブ」轨道；センター在该动作中基本静止。
  'グルーブ':'hips','上半身':'spine','上半身2':'chest','上半身3':'upperChest',
  '首':'neck','頭':'head',
  '右肩':'rightShoulder','右腕':'rightUpperArm','右ひじ':'rightLowerArm','右手首':'rightHand',
  '右親指０':'rightThumbMetacarpal','右親指１':'rightThumbProximal','右親指２':'rightThumbDistal',
  '右小指１':'rightLittleProximal','右小指２':'rightLittleIntermediate','右小指３':'rightLittleDistal',
  '右薬指１':'rightRingProximal','右薬指２':'rightRingIntermediate','右薬指３':'rightRingDistal',
  '右中指１':'rightMiddleProximal','右中指２':'rightMiddleIntermediate','右中指３':'rightMiddleDistal',
  '右人指１':'rightIndexProximal','右人指２':'rightIndexIntermediate','右人指３':'rightIndexDistal',
  '左肩':'leftShoulder','左腕':'leftUpperArm','左ひじ':'leftLowerArm','左手首':'leftHand',
  '左親指０':'leftThumbMetacarpal','左親指１':'leftThumbProximal','左親指２':'leftThumbDistal',
  '左小指１':'leftLittleProximal','左小指２':'leftLittleIntermediate','左小指３':'leftLittleDistal',
  '左薬指１':'leftRingProximal','左薬指２':'leftRingIntermediate','左薬指３':'leftRingDistal',
  '左中指１':'leftMiddleProximal','左中指２':'leftMiddleIntermediate','左中指３':'leftMiddleDistal',
  '左人指１':'leftIndexProximal','左人指２':'leftIndexIntermediate','左人指３':'leftIndexDistal',
  '右目':'rightEye','左目':'leftEye',
  '右足':'rightUpperLeg','右ひざ':'rightLowerLeg','右足首':'rightFoot','右足先EX':'rightToes',
  '左足':'leftUpperLeg','左ひざ':'leftLowerLeg','左足首':'leftFoot','左足先EX':'leftToes',
};

// ─── Scene Setup ──────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.prepend(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.add(new THREE.AmbientLight(0xffffff, 1.0));
const dl = new THREE.DirectionalLight(0xffffff, 3); dl.position.set(1,1,1).normalize(); scene.add(dl);
const f1 = new THREE.DirectionalLight(0x8888ff, 0.5); f1.position.set(-1,0.5,-1).normalize(); scene.add(f1);
const f2 = new THREE.DirectionalLight(0xff8888, 0.3); f2.position.set(0,-1,0.5).normalize(); scene.add(f2);
scene.add(new THREE.GridHelper(10,10,0x444466,0x333355));

const camera = new THREE.PerspectiveCamera(30, innerWidth/innerHeight, 0.1, 20);
camera.position.set(0,1,5);
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0,1,0); controls.enableDamping=true; controls.dampingFactor=0.08;
controls.screenSpacePanning=true; controls.touches={ONE:THREE.TOUCH.ROTATE,TWO:THREE.TOUCH.DOLLY_PAN};
controls.update();

// ─── VRM Load (vrm-viewer-mobile approach) ───────────
let vrm, vrmScene;

async function loadVRM() {
  setProgress(10,'加载 VRM 模型...');
  const loader=new GLTFLoader();
  loader.register(p=>new THREEVRM.VRMLoaderPlugin(p));
  loader.register(p=>new VRMAnimationLoaderPlugin(p));
  const gltf = await new Promise((res,rej)=>{
    loader.load(cfg.modelPath, res, xhr=>{
      setProgress(10+(xhr.loaded/xhr.total)*40,`VRM ${Math.round(xhr.loaded/1024)}KB`);
    }, rej);
  });
  vrm=gltf.userData.vrm; vrmScene=gltf.scene;
  THREEVRM.VRMUtils.removeUnnecessaryVertices(vrmScene);

  // Patch MToon shaders before first render
  vrmScene.traverse(c=>{
    if(!c.isMesh) return; c.frustumCulled=false;
    (Array.isArray(c.material)?c.material:[c.material]).forEach(patchShaderMaterial);
  });

  const box=new THREE.Box3().setFromObject(vrmScene);
  const s=1.6/Math.max(...box.getSize(new THREE.Vector3()).toArray());
  vrmScene.scale.set(s,s,s); vrmScene.position.y=0; vrmScene.rotation.y=Math.PI;
  scene.add(vrmScene);
  vrm.update(0);
  setProgress(55,'VRM 加载完成');
}

// ─── VMD → BVH → VRMA (vrm-viewer-mobile conversion pipeline) ──
// 普通 VMD走 VRMA。对于含足IK的默认舞蹈，还会加载一个隐藏的原生 MMD
// source rig：先由 MMDAnimationHelper 解出 IK/grant，再将最终世界姿态传回 VRM。
let vmdClip, mixer, action;
let sourceRig=null;
const SOURCE_MODEL_PATH='./models/mmd-reference-miku.pmd';
const SOURCE_MMD_BY_TARGET={
  hips:'下半身', spine:'上半身', neck:'首', head:'頭',
  leftShoulder:'左肩', leftUpperArm:'左腕', leftLowerArm:'左ひじ', leftHand:'左手首',
  rightShoulder:'右肩', rightUpperArm:'右腕', rightLowerArm:'右ひじ', rightHand:'右手首',
  leftUpperLeg:'左足', leftLowerLeg:'左ひざ', leftFoot:'左足首', leftToes:'左つま先',
  rightUpperLeg:'右足', rightLowerLeg:'右ひざ', rightFoot:'右足首', rightToes:'右つま先',
  leftThumbProximal:'左親指１', leftThumbDistal:'左親指２',
  rightThumbProximal:'右親指１', rightThumbDistal:'右親指２',
  leftIndexProximal:'左人指１', leftIndexIntermediate:'左人指２', leftIndexDistal:'左人指３',
  rightIndexProximal:'右人指１', rightIndexIntermediate:'右人指２', rightIndexDistal:'右人指３',
  leftMiddleProximal:'左中指１', leftMiddleIntermediate:'左中指２', leftMiddleDistal:'左中指３',
  rightMiddleProximal:'右中指１', rightMiddleIntermediate:'右中指２', rightMiddleDistal:'右中指３',
  leftRingProximal:'左薬指１', leftRingIntermediate:'左薬指２', leftRingDistal:'左薬指３',
  rightRingProximal:'右薬指１', rightRingIntermediate:'右薬指２', rightRingDistal:'右薬指３',
  leftLittleProximal:'左小指１', leftLittleIntermediate:'左小指２', leftLittleDistal:'左小指３',
  rightLittleProximal:'右小指１', rightLittleIntermediate:'右小指２', rightLittleDistal:'右小指３',
};
const SOURCE_APPLY_ORDER=[
  // Keep VRMA's root/spine layer: MMD センター/下半身 has a different parent
  // semantic. Source assistance only replaces the limbs that need MMD IK/grant.
  'leftShoulder','leftUpperArm','leftLowerArm','leftHand',
  'rightShoulder','rightUpperArm','rightLowerArm','rightHand',
  'leftUpperLeg','leftLowerLeg','leftFoot','leftToes',
  'rightUpperLeg','rightLowerLeg','rightFoot','rightToes',
  'leftThumbProximal','leftThumbDistal','rightThumbProximal','rightThumbDistal',
  'leftIndexProximal','leftIndexIntermediate','leftIndexDistal','rightIndexProximal','rightIndexIntermediate','rightIndexDistal',
  'leftMiddleProximal','leftMiddleIntermediate','leftMiddleDistal','rightMiddleProximal','rightMiddleIntermediate','rightMiddleDistal',
  'leftRingProximal','leftRingIntermediate','leftRingDistal','rightRingProximal','rightRingIntermediate','rightRingDistal',
  'leftLittleProximal','leftLittleIntermediate','leftLittleDistal','rightLittleProximal','rightLittleIntermediate','rightLittleDistal',
];

function patchMmdSourceLoader(loader){
  const builder=loader.meshBuilder, original=builder.build.bind(builder);
  builder.build=function(data,...args){
    if(data.metadata){data.metadata.rigidBodyCount=0;data.metadata.constraintCount=0;}
    for(const morph of data.morphs??[]){
      if(!morph?.elements) continue;
      if(morph.elementCount>morph.elements.length) morph.elementCount=morph.elements.length;
      if(data.metadata?.format==='pmx'&&morph.type===0){morph.elements=morph.elements.filter(e=>e.index>=0&&e.index<data.morphs.length);morph.elementCount=morph.elements.length;}
      if(data.metadata?.format==='pmd'&&morph.type===0) morph.type=1;
    }
    return original(data,...args);
  };
}

async function createSourceRig(dance){
  if(!dance.sourceAssist) return null;
  const loader=new MMDLoader(); patchMmdSourceLoader(loader);
  const mesh=await new Promise((res,rej)=>loader.load(SOURCE_MODEL_PATH,res,undefined,rej));
  const animation=await new Promise((res,rej)=>loader.loadAnimation(dance.vmdPath,mesh,res,undefined,rej));
  const helper=new MMDAnimationHelper({afterglow:0});
  helper.add(mesh,{animation,physics:false,ik:true,grant:true});
  const mixer=helper.objects.get(mesh).mixer;
  mesh.updateWorldMatrix(true,true);
  const byName=mesh.skeleton.bones.reduce((map,b)=>(map.set(b.name,b),map),new Map());
  const sourceRest=new Map(), targetRest=new Map();
  for(const targetName of SOURCE_APPLY_ORDER){
    const source=byName.get(SOURCE_MMD_BY_TARGET[targetName]);
    const target=vrm.humanoid.getRawBoneNode(targetName);
    if(!source||!target) continue;
    sourceRest.set(targetName,source.getWorldQuaternion(new THREE.Quaternion()));
    targetRest.set(targetName,target.getWorldQuaternion(new THREE.Quaternion()));
  }
  const rig={mesh,helper,mixer,byName,sourceRest,targetRest,duration:animation.duration};
  window.__sourceMmdRigDebug=rig;
  return rig;
}

const _sourceQ0=new THREE.Quaternion(),_sourceQ1=new THREE.Quaternion(),_sourceQ2=new THREE.Quaternion(),_sourceQ3=new THREE.Quaternion(),_sourceQ4=new THREE.Quaternion();
const _sourceV0=new THREE.Vector3(),_sourceV1=new THREE.Vector3(),_sourceV2=new THREE.Vector3();
const _sourceArmFlip=new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1,0,0),Math.PI);
const _sourceFingerFlip=new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0),Math.PI);
const SOURCE_DIRECTION_CHAINS=[
  ['leftShoulder','leftUpperArm'],['leftUpperArm','leftLowerArm'],['leftLowerArm','leftHand'],
  ['rightShoulder','rightUpperArm'],['rightUpperArm','rightLowerArm'],['rightLowerArm','rightHand'],
  ['leftUpperLeg','leftLowerLeg'],['leftLowerLeg','leftFoot'],['leftFoot','leftToes'],
  ['rightUpperLeg','rightLowerLeg'],['rightLowerLeg','rightFoot'],['rightFoot','rightToes'],
  ['leftIndexProximal','leftIndexIntermediate'],['leftIndexIntermediate','leftIndexDistal'],
  ['rightIndexProximal','rightIndexIntermediate'],['rightIndexIntermediate','rightIndexDistal'],
];
function applySourcePoseCorrection(time){
  if(!sourceRig||!vrm) return;
  sourceRig.mixer.setTime(THREE.MathUtils.euclideanModulo(time,sourceRig.duration));
  sourceRig.helper.update(0);
  sourceRig.mesh.updateWorldMatrix(true,true);
  const sourceHipWorld=sourceRig.byName.get('下半身')?.getWorldPosition(_sourceV0);
  const targetHip=vrm.humanoid.getRawBoneNode('hips');
  if(!sourceHipWorld||!targetHip) return;
  const sourceHipQ=sourceRig.byName.get('下半身').getWorldQuaternion(_sourceQ0);
  const targetHipQ=targetHip.getWorldQuaternion(_sourceQ1);
  // Rebuild each target limb by its MMD post-IK bone direction in hips-local
  // space. This is bind-axis independent and works for arms, fingers and legs.
  for(const [parentName,childName] of SOURCE_DIRECTION_CHAINS){
    const sourceParent=sourceRig.byName.get(SOURCE_MMD_BY_TARGET[parentName]);
    const sourceChild=sourceRig.byName.get(SOURCE_MMD_BY_TARGET[childName]);
    const targetParent=vrm.humanoid.getRawBoneNode(parentName);
    const targetChild=vrm.humanoid.getRawBoneNode(childName);
    if(!sourceParent||!sourceChild||!targetParent||!targetChild) continue;
    const desired=_sourceV1.copy(sourceChild.getWorldPosition(_sourceV2)).sub(sourceParent.getWorldPosition(_sourceV0)).applyQuaternion(_sourceQ3.copy(sourceHipQ).invert()).normalize().applyQuaternion(targetHipQ);
    const current=targetChild.getWorldPosition(_sourceV2).sub(targetParent.getWorldPosition(_sourceV0)).normalize();
    const delta=_sourceQ2.setFromUnitVectors(current,desired);
    const parentWorld=targetParent.parent.getWorldQuaternion(_sourceQ3);
    targetParent.quaternion.premultiply(_sourceQ4.copy(parentWorld).invert().multiply(delta).multiply(parentWorld));
    targetParent.updateWorldMatrix(false,true);
  }
}

async function loadVMD(dance) {
  setProgress(55,`解析并转换：${dance.title}...`);
  const resp=await fetch(dance.vmdPath);
  if(!resp.ok) throw new Error(`VMD 下载失败 (${resp.status})`);
  const buffer=await resp.arrayBuffer();
  setProgress(62,'VMD → BVH 骨骼重定向...');

  const parser=new Parser();
  const vmd=parser.parseVmd(buffer);
  // 使用与 vrm-viewer-mobile 一致的标准 VRM 骨架转换，避免膝盖/手臂轴向翻转。
  const query=new URLSearchParams(location.search);
  const armCorrection=query.get('armCorrection') ?? dance.retarget?.armCorrection;
  const fingerCorrection=query.get('fingerCorrection') ?? dance.retarget?.fingerCorrection;
  const bvhText=vmdToBVH(vmd,vrm,{fps:30,scale:0.1,...(dance.retarget ?? {}), ...(armCorrection ? { armCorrection } : {}), ...(fingerCorrection ? { fingerCorrection } : {})});
  const bvh=new BVHLoader().parse(bvhText);
  setProgress(73,'BVH → VRMA 动画...');
  // Fixed-camera dance mode: omit the hips translation track from the exported
  // VRMA completely. A constant/zero track is still normalized by three-vrm;
  // no track is the only unambiguous way to keep the avatar planted.
  const vrmaBuffer=await convertBVHToVRMAnimation(bvh,{scale:0.01,includeHipsTranslation:dance.retarget?.includeHipsTranslation ?? false});

  const animationLoader=new GLTFLoader();
  animationLoader.register(p=>new VRMAnimationLoaderPlugin(p));
  const blobUrl=URL.createObjectURL(new Blob([vrmaBuffer],{type:'model/gltf-binary'}));
  try {
    const animationGltf=await new Promise((res,rej)=>animationLoader.load(blobUrl,res,undefined,rej));
    const data=animationGltf.userData.vrmAnimations?.[0];
    if(!data) throw new Error('转换后的 VRMA 不含动画数据');
    vmdClip=createVRMAnimationClip(data,vrm);
  } finally {
    URL.revokeObjectURL(blobUrl);
  }

  mixer=new THREE.AnimationMixer(vrm.scene);
  // Expose a deterministic, read-only pose probe for end-to-end regression tests.
  // It samples the *actual target VRM after createVRMAnimationClip*, rather than
  // merely checking the source VMD or an intermediate BVH quaternion.
  window.__vrmDanceDebug = {
    samplePoseAt: (seconds) => {
      const probe = mixer.clipAction(vmdClip);
      const wasRunning = probe.isRunning();
      const wasPaused = probe.paused;
      const previousTime = probe.time;
      probe.enabled = true;
      probe.paused = false;
      probe.play();
      probe.time = THREE.MathUtils.euclideanModulo(seconds, vmdClip.duration);
      mixer.update(0);
      applySourcePoseCorrection(probe.time);
      vrm.update(0);
      vrm.scene.updateWorldMatrix(true, true);
      const bone = (boneName) => vrm.humanoid.getRawBoneNode(boneName);
      const point = (boneName) => bone(boneName).getWorldPosition(new THREE.Vector3()).toArray();
      const rotation = (boneName) => bone(boneName).getWorldQuaternion(new THREE.Quaternion()).toArray();
      const forward = new THREE.Vector3(0, 0, 1).applyQuaternion(vrm.scene.getWorldQuaternion(new THREE.Quaternion())).normalize().toArray();
      probe.time = previousTime;
      probe.paused = wasPaused;
      if (!wasRunning) probe.stop();
      return {
        time: seconds,
        forward,
        left: {
          hip: point('leftUpperLeg'), knee: point('leftLowerLeg'), ankle: point('leftFoot'),
          shoulder: point('leftShoulder'), upperArm: point('leftUpperArm'), elbow: point('leftLowerArm'), wrist: point('leftHand'),
          index: { proximal: point('leftIndexProximal'), intermediate: point('leftIndexIntermediate'), distal: point('leftIndexDistal') },
          middle: { proximal: point('leftMiddleProximal'), intermediate: point('leftMiddleIntermediate'), distal: point('leftMiddleDistal') },
        },
        right: {
          hip: point('rightUpperLeg'), knee: point('rightLowerLeg'), ankle: point('rightFoot'),
          shoulder: point('rightShoulder'), upperArm: point('rightUpperArm'), elbow: point('rightLowerArm'), wrist: point('rightHand'),
          index: { proximal: point('rightIndexProximal'), intermediate: point('rightIndexIntermediate'), distal: point('rightIndexDistal') },
          middle: { proximal: point('rightMiddleProximal'), intermediate: point('rightMiddleIntermediate'), distal: point('rightMiddleDistal') },
        },
        rotations: Object.fromEntries([
          'hips','spine','neck','head',
          'leftShoulder','leftUpperArm','leftLowerArm','leftHand',
          'rightShoulder','rightUpperArm','rightLowerArm','rightHand',
          'leftUpperLeg','leftLowerLeg','leftFoot',
          'rightUpperLeg','rightLowerLeg','rightFoot',
          'leftIndexProximal','leftIndexIntermediate','leftIndexDistal',
          'rightIndexProximal','rightIndexIntermediate','rightIndexDistal',
        ].map((name) => [name, rotation(name)])),
      };
    },
    sampleClipTracksAt: (seconds) => {
      const time = THREE.MathUtils.euclideanModulo(seconds, vmdClip.duration);
      const result = {};
      for (const track of vmdClip.tracks) {
        if (!/(left|right)(UpperLeg|LowerLeg|Foot|UpperArm|LowerArm|Hand)\.quaternion$/.test(track.name)) continue;
        const interpolant = track.createInterpolant();
        result[track.name] = Array.from(interpolant.evaluate(time));
      }
      return result;
    },
  };
  setProgress(85,`VMD 转换完成（${vmdClip.duration.toFixed(1)}秒）`);
}

// ─── Audio + dance switching ─────────────────────────
let audioCtx,audioBuffer,sourceNode,gainNode,isAudioReady;

function stopAudio() {
  if(sourceNode){ try{sourceNode.stop()}catch(e){} sourceNode=null; }
}

async function loadAudio(dance) {
  setProgress(85,`加载音乐：${dance.title}...`);
  const resp=await fetch(dance.audioPath);
  if(!resp.ok) throw new Error(`音乐下载失败 (${resp.status})`);
  if(!audioCtx) audioCtx=new AudioContext();
  audioBuffer=await audioCtx.decodeAudioData(await resp.arrayBuffer());
  if(!gainNode){ gainNode=audioCtx.createGain(); gainNode.gain.value=0.7; gainNode.connect(audioCtx.destination); }
  isAudioReady=true;
}

// ─── Playback (standard VRMA retargeting) ─────────────
let isPlaying=false;
let danceLoading=false;
const clock=new THREE.Clock();

function startPlayback(){
  if(!vmdClip||!mixer||danceLoading)return;
  // First click creates the action. Later clicks resume the same action and
  // preserve action.time — this control is pause/resume, never stop/restart.
  if(!action){
    action=mixer.clipAction(vmdClip);
    action.setLoop(THREE.LoopRepeat);
    action.reset().play();
  } else {
    action.paused=false;
    action.play();
  }
  isPlaying=true;
  if(isAudioReady&&audioBuffer){
    stopAudio();
    sourceNode=audioCtx.createBufferSource(); sourceNode.buffer=audioBuffer;
    sourceNode.connect(gainNode);
    sourceNode.start(0,(action.time||0)%audioBuffer.duration);
  }
  btnPlay.textContent='⏸';
}

function pausePlayback(){
  if(!action)return;
  // Freeze exactly at the current mixer time; source nodes cannot be resumed,
  // so stop audio only and recreate it from action.time when resuming.
  action.paused=true;
  isPlaying=false;
  stopAudio();
  btnPlay.textContent='▶';
}

async function loadDance(key, { autoplay = false, initial = false } = {}) {
  const dance=dances[key];
  if(!dance || !vrm) return;
  danceLoading=true;
  danceSelect.disabled=true;
  btnPlay.disabled=true;
  const wasPlaying=isPlaying;
  pausePlayback();
  if(action){ action.stop(); action=null; }
  if(mixer){ mixer.stopAllAction(); mixer.uncacheRoot(vrm.scene); }
  mixer=null; vmdClip=null; sourceRig=null; window.__sourceMmdRigDebug=null; audioBuffer=null; isAudioReady=false;
  try {
    await loadVMD(dance);
    sourceRig=await createSourceRig(dance);
    await loadAudio(dance);
    selectedDanceKey=key;
    danceSelect.value=key;
    infoEl.textContent=`🐱 猫女郎 · ${dance.title}`;
    if(initial){ setProgress(100,'加载完成 ✓'); setTimeout(()=>loadingEl.classList.add('hidden'),500); }
    else statusText.textContent=`✓ 已切换：${dance.title}`;
    // Release the loading gate before autoplaying the fresh action.
    danceLoading=false;
    if(autoplay || wasPlaying) startPlayback();
  } finally {
    danceLoading=false;
    danceSelect.disabled=false;
    btnPlay.disabled=false;
  }
}

function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta();
  // Keep the same order as vrm-viewer-mobile: VRM internal updates first,
  // then the mixer writes the retargeted humanoid pose for this frame.
  if(vrm) vrm.update(dt);
  // Pausing must freeze the mixer itself; stopping audio alone leaves poses advancing.
  if(isPlaying&&mixer) {
    mixer.update(dt);
    // For IK-driven MMD dances the raw VMD clip is only a fallback layer.
    // Apply the native MMD IK/grant result afterwards so mixer cannot overwrite it.
    applySourcePoseCorrection(action?.time ?? 0);
    vrm.update(0);
  }
  if(isPlaying&&vmdClip){
    const elapsed=action?.time||0;
    const total=vmdClip.duration;
    const c=Math.floor(elapsed),m=Math.floor(total);
    timeDisplay.textContent=`${Math.floor(c/60)}:${String(c%60).padStart(2,'0')} / ${Math.floor(m/60)}:${String(m%60).padStart(2,'0')}`;
  }
  controls.update();
  renderer.render(scene,camera);
}

btnPlay.addEventListener('click',async()=>{
  if(audioCtx&&audioCtx.state==='suspended') await audioCtx.resume();
  if(isPlaying) pausePlayback();
  else startPlayback();
});

danceSelect.addEventListener('change', async () => {
  try {
    await loadDance(danceSelect.value, { autoplay: true });
  } catch (err) {
    statusText.textContent='❌ '+err.message; console.error(err);
  }
});

addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);
});

(async()=>{
  try{
    await loadVRM(); await loadDance(selectedDanceKey, { initial: true }); animate();
    setTimeout(startPlayback,1500);
  }catch(err){
    statusText.textContent='❌ '+err.message; console.error(err);
  }
})();
</script>
</body>
