<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>VRM + VMD Dance</title>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.176.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.176.0/examples/jsm/",
    "three/addons/loaders/MMDLoader.js": "https://cdn.jsdelivr.net/npm/three@0.171.0/examples/jsm/loaders/MMDLoader.js",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3/lib/three-vrm.module.min.js",
    "@pixiv/three-vrm-animation": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm-animation@3/lib/three-vrm-animation.module.min.js"
  }
}
</script>

<style>
* { -webkit-tap-highlight-color: transparent; }
body { margin:0; overflow:hidden; user-select:none; -webkit-user-select:none; font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background:#1a1a2e; color:#fff; }
canvas { touch-action:none; display:block; }
#loading { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#1a1a2e; z-index:100; transition:opacity .5s; }
#loading.hidden { opacity:0; pointer-events:none; }
#loading h1 { font-size:24px; margin-bottom:24px; background:linear-gradient(135deg,#e94560,#0f3460); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.loader-bar { width:280px; height:4px; background:#16213e; border-radius:2px; overflow:hidden; }
.loader-bar .fill { height:100%; width:0%; background:linear-gradient(90deg,#e94560,#0f3460); border-radius:2px; transition:width .3s; }
#loading p { margin-top:12px; font-size:13px; color:#888; }
#controls { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); display:flex; gap:12px; align-items:center; z-index:50; background:rgba(0,0,0,.5); backdrop-filter:blur(10px); padding:10px 20px; border-radius:30px; border:1px solid rgba(255,255,255,.1); }
#controls button { width:44px; height:44px; border-radius:50%; border:1px solid rgba(255,255,255,.2); background:rgba(255,255,255,.08); color:#fff; font-size:20px; cursor:pointer; transition:all .2s; display:flex; align-items:center; justify-content:center; }
#controls button:hover { background:rgba(255,255,255,.2); }
#controls button:active { transform:scale(.9); }
#controls .time { font-size:12px; color:#aaa; min-width:80px; text-align:center; font-variant-numeric:tabular-nums; }
#info { position:fixed; top:12px; left:50%; transform:translateX(-50%); z-index:50; background:rgba(0,0,0,.4); backdrop-filter:blur(8px); padding:6px 16px; border-radius:20px; font-size:12px; color:#ccc; white-space:nowrap; border:1px solid rgba(255,255,255,.06); pointer-events:none; }
#ver { position:fixed; bottom:6px; right:8px; z-index:50; font-size:10px; color:rgba(255,255,255,.2); pointer-events:none; user-select:none; -webkit-user-select:none; }
</style>
</head>
<body>
<div id="loading">
  <h1>🎵 VRM + VMD Dance</h1>
  <div class="loader-bar"><div class="fill" id="progress-fill"></div></div>
  <p id="status-text">加载中...</p>
</div>
<div id="info">🐱 猫女郎 · 酒醉的蝴蝶</div>
<div id="ver">v20260711.020945</div>
<div id="controls">
  <button id="btnPlay" title="播放/暂停">▶</button>
  <div class="time" id="timeDisplay">0:00 / 0:00</div>
</div>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import * as THREEVRM from '@pixiv/three-vrm';
import { VRMAnimationLoaderPlugin, createVRMAnimationClip } from '@pixiv/three-vrm-animation';
import { Parser } from './libs/mmdparser.module.js';
import { vmdToBVH } from './libs/VMD_to_BVH.js';
import { BVHLoader } from './libs/BVHLoader.js';
import { convertBVHToVRMAnimation } from './libs/convertBVHToVRMAnimation.js';

// ─── Patch MToon shader (getShadow compat with r176) ──
function patchShaderMaterial(mat) {
  if (!mat || mat._shadowPatched) return;
  const origCb = mat.onBeforeCompile;
  mat.onBeforeCompile = function(shader) {
    if (origCb) origCb.call(this, shader);
    shader.fragmentShader = shader.fragmentShader.replace(
      /getShadow\s*\([^)]+\)\s*/g, '1.0'
    );
  };
  mat._shadowPatched = true;
}

// ─── Config ──────────────────────────────────────────
const VMD_FPS = 30;
const cfg = {
  modelPath: './models/猫女郎.vrm',
  vmdPaths: ['./vmd/兰若酒醉的蝴蝶mmd数据.vmd'],
  audioPath: './audio/酒醉的蝴蝶音频.wav',
};

// ─── DOM ─────────────────────────────────────────────
const loadingEl = document.getElementById('loading');
const progressFill = document.getElementById('progress-fill');
const statusText = document.getElementById('status-text');
const btnPlay = document.getElementById('btnPlay');
const timeDisplay = document.getElementById('timeDisplay');

function setProgress(pct, msg) {
  progressFill.style.width = Math.min(pct, 100) + '%';
  if (msg) statusText.textContent = msg;
}

// ─── Bone Mapping (SystemAnimatorOnline) ──────────────
const boneMapMMDToVRM = {
  // 此 VMD 的实际根运动在「グルーブ」轨道；センター在该动作中基本静止。
  'グルーブ':'hips','上半身':'spine','上半身2':'chest','上半身3':'upperChest',
  '首':'neck','頭':'head',
  '右肩':'rightShoulder','右腕':'rightUpperArm','右ひじ':'rightLowerArm','右手首':'rightHand',
  '右親指０':'rightThumbMetacarpal','右親指１':'rightThumbProximal','右親指２':'rightThumbDistal',
  '右小指１':'rightLittleProximal','右小指２':'rightLittleIntermediate','右小指３':'rightLittleDistal',
  '右薬指１':'rightRingProximal','右薬指２':'rightRingIntermediate','右薬指３':'rightRingDistal',
  '右中指１':'rightMiddleProximal','右中指２':'rightMiddleIntermediate','右中指３':'rightMiddleDistal',
  '右人指１':'rightIndexProximal','右人指２':'rightIndexIntermediate','右人指３':'rightIndexDistal',
  '左肩':'leftShoulder','左腕':'leftUpperArm','左ひじ':'leftLowerArm','左手首':'leftHand',
  '左親指０':'leftThumbMetacarpal','左親指１':'leftThumbProximal','左親指２':'leftThumbDistal',
  '左小指１':'leftLittleProximal','左小指２':'leftLittleIntermediate','左小指３':'leftLittleDistal',
  '左薬指１':'leftRingProximal','左薬指２':'leftRingIntermediate','左薬指３':'leftRingDistal',
  '左中指１':'leftMiddleProximal','左中指２':'leftMiddleIntermediate','左中指３':'leftMiddleDistal',
  '左人指１':'leftIndexProximal','左人指２':'leftIndexIntermediate','左人指３':'leftIndexDistal',
  '右目':'rightEye','左目':'leftEye',
  '右足':'rightUpperLeg','右ひざ':'rightLowerLeg','右足首':'rightFoot','右足先EX':'rightToes',
  '左足':'leftUpperLeg','左ひざ':'leftLowerLeg','左足首':'leftFoot','左足先EX':'leftToes',
};

// ─── Scene Setup ──────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.prepend(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.add(new THREE.AmbientLight(0xffffff, 1.0));
const dl = new THREE.DirectionalLight(0xffffff, 3); dl.position.set(1,1,1).normalize(); scene.add(dl);
const f1 = new THREE.DirectionalLight(0x8888ff, 0.5); f1.position.set(-1,0.5,-1).normalize(); scene.add(f1);
const f2 = new THREE.DirectionalLight(0xff8888, 0.3); f2.position.set(0,-1,0.5).normalize(); scene.add(f2);
scene.add(new THREE.GridHelper(10,10,0x444466,0x333355));

const camera = new THREE.PerspectiveCamera(30, innerWidth/innerHeight, 0.1, 20);
camera.position.set(0,1,5);
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0,1,0); controls.enableDamping=true; controls.dampingFactor=0.08;
controls.screenSpacePanning=true; controls.touches={ONE:THREE.TOUCH.ROTATE,TWO:THREE.TOUCH.DOLLY_PAN};
controls.update();

// ─── VRM Load (vrm-viewer-mobile approach) ───────────
let vrm, vrmScene;

async function loadVRM() {
  setProgress(10,'加载 VRM 模型...');
  const loader=new GLTFLoader();
  loader.register(p=>new THREEVRM.VRMLoaderPlugin(p));
  loader.register(p=>new VRMAnimationLoaderPlugin(p));
  const gltf = await new Promise((res,rej)=>{
    loader.load(cfg.modelPath, res, xhr=>{
      setProgress(10+(xhr.loaded/xhr.total)*40,`VRM ${Math.round(xhr.loaded/1024)}KB`);
    }, rej);
  });
  vrm=gltf.userData.vrm; vrmScene=gltf.scene;
  THREEVRM.VRMUtils.removeUnnecessaryVertices(vrmScene);

  // Patch MToon shaders before first render
  vrmScene.traverse(c=>{
    if(!c.isMesh) return; c.frustumCulled=false;
    (Array.isArray(c.material)?c.material:[c.material]).forEach(patchShaderMaterial);
  });

  const box=new THREE.Box3().setFromObject(vrmScene);
  const s=1.6/Math.max(...box.getSize(new THREE.Vector3()).toArray());
  vrmScene.scale.set(s,s,s); vrmScene.position.y=0; vrmScene.rotation.y=Math.PI;
  scene.add(vrmScene);
  vrm.update(0);
  setProgress(55,'VRM 加载完成');
}

// ─── VMD → BVH → VRMA (vrm-viewer-mobile conversion pipeline) ──
// 直接把 MMD 局部四元数塞给 VRM 会遗漏坐标系和 bind-pose 差异，典型症状就是膝盖翻向身后。
// 这里使用已验证的 VMD→BVH→VRMA 管线，让 createVRMAnimationClip 处理骨骼重定向。
let vmdClip, mixer, action;

async function loadVMD() {
  setProgress(55,'解析并转换 VMD 动作...');
  const resp=await fetch(cfg.vmdPaths[0]);
  if(!resp.ok) throw new Error(`VMD 下载失败 (${resp.status})`);
  const buffer=await resp.arrayBuffer();
  setProgress(62,'VMD → BVH 骨骼重定向...');

  const parser=new Parser();
  const vmd=parser.parseVmd(buffer);
  // 使用与 vrm-viewer-mobile 一致的标准 VRM 骨架转换，避免膝盖/手臂轴向翻转。
  const bvhText=vmdToBVH(vmd,vrm,{fps:30,scale:0.1});
  const bvh=new BVHLoader().parse(bvhText);
  setProgress(73,'BVH → VRMA 动画...');
  // Fixed-camera dance mode: omit the hips translation track from the exported
  // VRMA completely. A constant/zero track is still normalized by three-vrm;
  // no track is the only unambiguous way to keep the avatar planted.
  const vrmaBuffer=await convertBVHToVRMAnimation(bvh,{scale:0.01,includeHipsTranslation:false});

  const animationLoader=new GLTFLoader();
  animationLoader.register(p=>new VRMAnimationLoaderPlugin(p));
  const blobUrl=URL.createObjectURL(new Blob([vrmaBuffer],{type:'model/gltf-binary'}));
  try {
    const animationGltf=await new Promise((res,rej)=>animationLoader.load(blobUrl,res,undefined,rej));
    const data=animationGltf.userData.vrmAnimations?.[0];
    if(!data) throw new Error('转换后的 VRMA 不含动画数据');
    vmdClip=createVRMAnimationClip(data,vrm);
  } finally {
    URL.revokeObjectURL(blobUrl);
  }

  mixer=new THREE.AnimationMixer(vrm.scene);
  setProgress(85,`VMD 转换完成（${vmdClip.duration.toFixed(1)}秒）`);
}

// ─── Audio ────────────────────────────────────────────
let audioCtx,audioBuffer,sourceNode,gainNode,isAudioReady;

async function loadAudio() {
  setProgress(85,'加载音频...');
  const resp=await fetch(cfg.audioPath);
  audioCtx=new AudioContext();
  audioBuffer=await audioCtx.decodeAudioData(await resp.arrayBuffer());
  gainNode=audioCtx.createGain(); gainNode.gain.value=0.7; gainNode.connect(audioCtx.destination);
  isAudioReady=true;
  setProgress(100,'加载完成 ✓');
  setTimeout(()=>loadingEl.classList.add('hidden'),500);
}

// ─── Playback (standard VRMA retargeting) ─────────────
let isPlaying=false;
const clock=new THREE.Clock();

function startPlayback(){
  if(!vmdClip||!mixer)return;
  // First click creates the action. Later clicks resume the same action and
  // preserve action.time — this control is pause/resume, never stop/restart.
  if(!action){
    action=mixer.clipAction(vmdClip);
    action.setLoop(THREE.LoopRepeat);
    action.reset().play();
  } else {
    action.paused=false;
    action.play();
  }
  isPlaying=true;
  if(isAudioReady&&audioBuffer){
    sourceNode=audioCtx.createBufferSource(); sourceNode.buffer=audioBuffer;
    sourceNode.connect(gainNode);
    sourceNode.start(0,(action.time||0)%audioBuffer.duration);
  }
  btnPlay.textContent='⏸';
}

function pausePlayback(){
  if(!action)return;
  // Freeze exactly at the current mixer time; source nodes cannot be resumed,
  // so stop audio only and recreate it from action.time when resuming.
  action.paused=true;
  isPlaying=false;
  if(sourceNode){try{sourceNode.stop()}catch(e){}sourceNode=null}
  btnPlay.textContent='▶';
}

function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta();
  // Keep the same order as vrm-viewer-mobile: VRM internal updates first,
  // then the mixer writes the retargeted humanoid pose for this frame.
  if(vrm) vrm.update(dt);
  // Pausing must freeze the mixer itself; stopping audio alone leaves poses advancing.
  if(isPlaying&&mixer) mixer.update(dt);
  if(isPlaying&&vmdClip){
    const elapsed=action?.time||0;
    const total=vmdClip.duration;
    const c=Math.floor(elapsed),m=Math.floor(total);
    timeDisplay.textContent=`${Math.floor(c/60)}:${String(c%60).padStart(2,'0')} / ${Math.floor(m/60)}:${String(m%60).padStart(2,'0')}`;
  }
  controls.update();
  renderer.render(scene,camera);
}

btnPlay.addEventListener('click',async()=>{
  if(audioCtx&&audioCtx.state==='suspended') await audioCtx.resume();
  if(isPlaying) pausePlayback();
  else startPlayback();
});

addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);
});

(async()=>{
  try{
    await loadVRM(); await loadVMD(); await loadAudio(); animate();
    setTimeout(startPlayback,1500);
  }catch(err){
    statusText.textContent='❌ '+err.message; console.error(err);
  }
})();
</script>
</body>
</html>
