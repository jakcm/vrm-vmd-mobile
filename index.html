<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>VRM + VMD Dance</title>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.171.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.171.0/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.1.0/lib/three-vrm.module.js",
    "@pixiv/three-vrm-core": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm-core@2.1.0/lib/three-vrm-core.module.js",
    "@pixiv/three-vrm-materials-mtoon": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm-materials-mtoon@2.1.0/lib/three-vrm-materials-mtoon.module.js"
  }
}
</script>

<style>
* { -webkit-tap-highlight-color: transparent; }
body {
  margin: 0; overflow: hidden;
  user-select: none; -webkit-user-select: none;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #1a1a2e;
  color: white;
}
canvas { touch-action: none; display: block; }

#loading {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: #1a1a2e;
  z-index: 100;
  transition: opacity 0.5s;
}
#loading.hidden { opacity: 0; pointer-events: none; }
#loading h1 {
  font-size: 24px; margin-bottom: 24px;
  background: linear-gradient(135deg, #e94560, #0f3460);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.loader-bar {
  width: 280px; height: 4px;
  background: #16213e; border-radius: 2px; overflow: hidden;
}
.loader-bar .fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, #e94560, #0f3460);
  border-radius: 2px;
  transition: width 0.3s;
}
#loading p { margin-top: 12px; font-size: 13px; color: #888; }

#controls {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 12px; align-items: center;
  z-index: 50;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
  padding: 10px 20px;
  border-radius: 30px;
  border: 1px solid rgba(255,255,255,0.1);
}
#controls button {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.08);
  color: white;
  font-size: 20px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
}
#controls button:hover { background: rgba(255,255,255,0.2); }
#controls button:active { transform: scale(0.9); }
#controls .time {
  font-size: 12px; color: #aaa;
  min-width: 80px; text-align: center;
  font-variant-numeric: tabular-nums;
}

#info {
  position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
  z-index: 50;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(8px);
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 12px;
  color: #ccc;
  white-space: nowrap;
  border: 1px solid rgba(255,255,255,0.06);
  pointer-events: none;
}
</style>
</head>
<body>

<div id="loading">
  <h1>🎵 VRM + VMD Dance</h1>
  <div class="loader-bar"><div class="fill" id="progress-fill"></div></div>
  <p id="status-text">加载中...</p>
</div>

<div id="info">🐱 猫女郎 · 酒醉的蝴蝶</div>

<div id="controls">
  <button id="btnPlay" title="播放/暂停">▶</button>
  <div class="time" id="timeDisplay">0:00 / 0:00</div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { MMDLoader } from 'three/addons/loaders/MMDLoader.js';
import * as THREEVRM from '@pixiv/three-vrm';
import { MToonMaterialLoaderPlugin } from '@pixiv/three-vrm-materials-mtoon';

// ─── Config ──────────────────────────────────────────

const VMD_FPS = 30;
const cfg = {
  modelPath: './models/猫女郎.vrm',
  vmdPaths: ['./vmd/兰若酒醉的蝴蝶mmd数据.vmd'],
  audioPath: './audio/酒醉的蝴蝶音频.wav',
};

// ─── DOM ─────────────────────────────────────────────

const loadingEl = document.getElementById('loading');
const progressFill = document.getElementById('progress-fill');
const statusText = document.getElementById('status-text');
const btnPlay = document.getElementById('btnPlay');
const timeDisplay = document.getElementById('timeDisplay');

function setProgress(pct, msg) {
  progressFill.style.width = Math.min(pct, 100) + '%';
  if (msg) statusText.textContent = msg;
}

// ─── Bone Mapping (SystemAnimatorOnline core) ─────────

const boneMapMMDToVRM = {
  'センター': 'hips', '上半身': 'spine', '上半身2': 'chest', '上半身3': 'upperChest',
  '首': 'neck', '頭': 'head',
  '右肩': 'rightShoulder', '右腕': 'rightUpperArm', '右ひじ': 'rightLowerArm', '右手首': 'rightHand',
  '右親指０': 'rightThumbMetacarpal', '右親指１': 'rightThumbProximal', '右親指２': 'rightThumbDistal',
  '右小指１': 'rightLittleProximal', '右小指２': 'rightLittleIntermediate', '右小指３': 'rightLittleDistal',
  '右薬指１': 'rightRingProximal', '右薬指２': 'rightRingIntermediate', '右薬指３': 'rightRingDistal',
  '右中指１': 'rightMiddleProximal', '右中指２': 'rightMiddleIntermediate', '右中指３': 'rightMiddleDistal',
  '右人指１': 'rightIndexProximal', '右人指２': 'rightIndexIntermediate', '右人指３': 'rightIndexDistal',
  '左肩': 'leftShoulder', '左腕': 'leftUpperArm', '左ひじ': 'leftLowerArm', '左手首': 'leftHand',
  '左親指０': 'leftThumbMetacarpal', '左親指１': 'leftThumbProximal', '左親指２': 'leftThumbDistal',
  '左小指１': 'leftLittleProximal', '左小指２': 'leftLittleIntermediate', '左小指３': 'leftLittleDistal',
  '左薬指１': 'leftRingProximal', '左薬指２': 'leftRingIntermediate', '左薬指３': 'leftRingDistal',
  '左中指１': 'leftMiddleProximal', '左中指２': 'leftMiddleIntermediate', '左中指３': 'leftMiddleDistal',
  '左人指１': 'leftIndexProximal', '左人指２': 'leftIndexIntermediate', '左人指３': 'leftIndexDistal',
  '右目': 'rightEye', '左目': 'leftEye',
  '右足': 'rightUpperLeg', '右ひざ': 'rightLowerLeg', '右足首': 'rightFoot', '右足先EX': 'rightToes',
  '左足': 'leftUpperLeg', '左ひざ': 'leftLowerLeg', '左足首': 'leftFoot', '左足先EX': 'leftToes',
};

// ─── Scene Setup ─────────────────────────────────────

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.prepend(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

// Lights
scene.add(new THREE.AmbientLight(0x606080, 0.8));
scene.add(new THREE.HemisphereLight(0x87CEEB, 0x3a7d44, 0.8));

const dirLight = new THREE.DirectionalLight(0xFFEECC, 2.0);
dirLight.position.set(8, 15, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
scene.add(dirLight);
scene.add(new THREE.DirectionalLight(0x8888FF, 0.5).position.set(-5, 3, -8));
scene.add(new THREE.DirectionalLight(0xFFFF88, 0.4).position.set(-3, 5, 5));
scene.add(new THREE.DirectionalLight(0x88FFFF, 0.3).position.set(3, 0, -5));

// Ground
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(30, 30),
  new THREE.MeshStandardMaterial({ color: 0x2a2a4a, roughness: 0.9 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.01;
ground.receiveShadow = true;
scene.add(ground);
const grid = new THREE.GridHelper(30, 30, 0x4a4a6a, 0x3a3a5a);
grid.position.y = 0;
scene.add(grid);

// Camera
const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.5, 4);
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.0, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 1.5;
controls.maxDistance = 10;
controls.maxPolarAngle = Math.PI * 0.55;
controls.touches = { ONE: THREE.TOUCH.ROTATE, TWO: THREE.TOUCH.DOLLY_PAN };
controls.update();

// ─── VRM Load ────────────────────────────────────────

let vrm = null;
let vrmScene = null;

async function loadVRM() {
  setProgress(10, '加载 VRM 模型...');
  const loader = new GLTFLoader();
  loader.register(parser => new THREEVRM.VRMLoaderPlugin(parser));
  loader.register(parser => new MToonMaterialLoaderPlugin(parser));

  const gltf = await new Promise((resolve, reject) => {
    loader.load(cfg.modelPath, resolve, xhr => {
      setProgress(10 + (xhr.loaded / xhr.total) * 40, `加载 VRM... ${Math.round(xhr.loaded/1024)}KB`);
    }, reject);
  });

  vrm = gltf.userData.vrm;
  vrmScene = gltf.scene;

  // Normalize scale
  const box = new THREE.Box3().setFromObject(vrmScene);
  const scale = 1.6 / Math.max(box.getSize(new THREE.Vector3()).x, box.getSize(new THREE.Vector3()).y, box.getSize(new THREE.Vector3()).z);
  vrmScene.scale.set(scale, scale, scale);
  vrmScene.position.y = 0;

  vrmScene.traverse(child => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
      child.frustumCulled = false;
    }
  });

  scene.add(vrmScene);
  vrm.update(0);
  setProgress(55, 'VRM 加载完成');
}

// ─── VMD Load ────────────────────────────────────────

let vmdData = null;

async function loadVMD() {
  setProgress(55, '加载 VMD 动作...');
  const loader = new MMDLoader();

  vmdData = await new Promise((resolve, reject) => {
    loader.loadVMD(cfg.vmdPaths[0], resolve, xhr => {
      setProgress(55 + (xhr.loaded / xhr.total) * 25, `加载 VMD... ${Math.round(xhr.loaded/1024)}KB`);
    }, reject);
  });

  // Normalize: CDN may return {motions, boneName, frameNum} vs {bones, name, frame}
  if (!vmdData.bones && vmdData.motions) vmdData.bones = vmdData.motions;
  if (vmdData.bones) {
    vmdData.bones.forEach(kf => {
      if (kf.boneName !== undefined && kf.name === undefined) kf.name = kf.boneName;
      if (kf.frameNum !== undefined && kf.frame === undefined) kf.frame = kf.frameNum;
    });
  }

  // Build bone tracks
  const boneTracks = {};
  if (vmdData.bones) {
    vmdData.bones.forEach(kf => {
      if (!boneTracks[kf.name]) boneTracks[kf.name] = [];
      boneTracks[kf.name].push(kf);
    });
    Object.values(boneTracks).forEach(t => t.sort((a, b) => a.frame - b.frame));
  }
  vmdData._boneTracks = boneTracks;

  // Morph tracks
  const morphTracks = {};
  if (vmdData.morphs) {
    vmdData.morphs.forEach(kf => {
      if (!morphTracks[kf.name]) morphTracks[kf.name] = [];
      morphTracks[kf.name].push(kf);
    });
    Object.values(morphTracks).forEach(t => t.sort((a, b) => a.frame - b.frame));
  }
  vmdData._morphTracks = morphTracks;

  // Total duration
  vmdData.totalFrames = 0;
  if (vmdData.bones) vmdData.bones.forEach(kf => { if (kf.frame > vmdData.totalFrames) vmdData.totalFrames = kf.frame; });
  if (vmdData.morphs) vmdData.morphs.forEach(kf => { if (kf.frame > vmdData.totalFrames) vmdData.totalFrames = kf.frame; });

  setProgress(85, 'VMD 加载完成');
}

// ─── Audio Load ───────────────────────────────────────

let audioCtx = null, audioBuffer = null, sourceNode = null, gainNode = null;
let audioStartTime = 0, audioPauseOffset = 0, isAudioReady = false;

async function loadAudio() {
  setProgress(85, '加载音频...');
  const resp = await fetch(cfg.audioPath);
  const ab = await resp.arrayBuffer();
  audioCtx = new AudioContext();
  audioBuffer = await audioCtx.decodeAudioData(ab);
  gainNode = audioCtx.createGain();
  gainNode.gain.value = 0.7;
  gainNode.connect(audioCtx.destination);
  isAudioReady = true;
  setProgress(100, '加载完成 ✓');
  setTimeout(() => loadingEl.classList.add('hidden'), 500);
}

// ─── Animation System (VMD → VRM via Bone Mapping) ───

const _q0 = new THREE.Quaternion(), _q1 = new THREE.Quaternion(), _v3 = new THREE.Vector3();

let animBones = [];
let animMorphs = [];
let isPlaying = false;
let animTime = 0;
const clock = new THREE.Clock();

function interpolateVMD(curve, time, kf0, kf1) {
  if (!kf1 && !kf0) return 0;
  if (!kf1) return 1;
  if (!kf0) return 0;
  const frameDiff = kf1.frame - kf0.frame;
  if (frameDiff <= 0) return 1;
  const t = (time - kf0.frame) / frameDiff;
  if (t <= 0) return 0;
  if (t >= 1) return 1;

  // Cubic Bezier interpolation (VMD format)
  const base = 0;
  const cpx1 = curve[base] / 127, cpy1 = curve[base + 1] / 127;
  const cpx2 = curve[base + 2] / 127, cpy2 = curve[base + 3] / 127;

  let guess = t;
  for (let i = 0; i < 8; i++) {
    const g2 = guess * guess, g3 = g2 * guess, omg = 1 - guess, omg2 = omg * omg;
    const bx = 3 * omg2 * guess * cpx1 + 3 * omg * g2 * cpx2 + g3;
    const dbx = 3 * (omg2 - 2 * omg * guess) * cpx1 + 3 * (2 * omg * guess - g2) * cpx2 + 3 * g2;
    if (Math.abs(bx - t) < 1e-5 || Math.abs(dbx) < 1e-10) break;
    guess = Math.max(0, Math.min(1, guess - (bx - t) / dbx));
  }
  const g2 = guess * guess, g3 = g2 * guess, omg = 1 - guess, omg2 = omg * omg;
  return Math.max(0, Math.min(1, 3 * omg2 * guess * cpy1 + 3 * omg * g2 * cpy2 + g3));
}

function setupAnimation() {
  if (!vmdData || !vrm) return;
  animBones = [];
  for (const mmdName in boneMapMMDToVRM) {
    const track = vmdData._boneTracks[mmdName];
    if (!track || track.length === 0) continue;
    const vrmName = boneMapMMDToVRM[mmdName];
    let bn;
    try { bn = vrm.humanoid?.getNormalizedBoneNode?.(vrmName) || vrm.humanoid?.getBoneNode?.(vrmName); } catch (e) {}
    if (!bn) continue;
    animBones.push({ mmdName, vrmName, track, isRoot: mmdName === 'センター', boneNode: bn });
  }
  animMorphs = [];
}

function applyVMDAtFrame(frame) {
  if (!vrm || !vmdData || animBones.length === 0) return;

  animBones.forEach(({ mmdName, vrmName, track, isRoot, boneNode }) => {
    const len = track.length;
    if (frame <= track[0].frame) {
      const kf = track[0];
      boneNode.quaternion.fromArray(kf.rotation);
      if (isRoot) boneNode.position.set(-kf.position[0], kf.position[1], kf.position[2]);
      return;
    }
    if (frame >= track[len - 1].frame) {
      const kf = track[len - 1];
      boneNode.quaternion.fromArray(kf.rotation);
      if (isRoot) boneNode.position.set(-kf.position[0], kf.position[1], kf.position[2]);
      return;
    }
    let lo = 0, hi = len - 1;
    while (hi - lo > 1) { const m = (lo + hi) >> 1; if (track[m].frame <= frame) lo = m; else hi = m; }
    const kf0 = track[lo], kf1 = track[hi];
    const interp = interpolateVMD(kf0.interpolation, frame, kf0, kf1);

    _q0.fromArray(kf0.rotation); _q1.fromArray(kf1.rotation);
    const cos = _q0.x * _q1.x + _q0.y * _q1.y + _q0.z * _q1.z + _q0.w * _q1.w;
    if (cos < 0) { _q1.x = -_q1.x; _q1.y = -_q1.y; _q1.z = -_q1.z; _q1.w = -_q1.w; }
    const theta = Math.acos(Math.abs(cos));
    const sinT = Math.sin(theta);
    if (sinT < 0.001) { boneNode.quaternion.copy(_q0); }
    else {
      const a = Math.sin((1 - interp) * theta) / sinT;
      const b = Math.sin(interp * theta) / sinT;
      boneNode.quaternion.set(_q0.x * a + _q1.x * b, _q0.y * a + _q1.y * b, _q0.z * a + _q1.z * b, _q0.w * a + _q1.w * b);
    }
    if (isRoot) {
      _v3.lerpVectors(
        new THREE.Vector3(-kf0.position[0], kf0.position[1], kf0.position[2]),
        new THREE.Vector3(-kf1.position[0], kf1.position[1], kf1.position[2]), interp);
      boneNode.position.copy(_v3);
    }
  });
}

// ─── Playback ─────────────────────────────────────────

function startPlayback() {
  if (!vmdData || !vrm) return;
  clock.start();
  animTime = 0;
  isPlaying = true;
  if (isAudioReady && audioBuffer) {
    sourceNode = audioCtx.createBufferSource();
    sourceNode.buffer = audioBuffer;
    sourceNode.connect(gainNode);
    sourceNode.start(0);
    audioStartTime = audioCtx.currentTime;
    audioPauseOffset = 0;
  }
  btnPlay.textContent = '⏸';
}

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  if (isPlaying && vmdData) {
    animTime += dt;
    const maxTime = vmdData.totalFrames / VMD_FPS;
    if (animTime >= maxTime) {
      animTime = 0;
      if (sourceNode) { try { sourceNode.stop(); } catch(e) {} sourceNode = null; }
      if (isAudioReady && audioBuffer) {
        sourceNode = audioCtx.createBufferSource();
        sourceNode.buffer = audioBuffer;
        sourceNode.connect(gainNode);
        sourceNode.start(0);
        audioStartTime = audioCtx.currentTime;
      }
    }
    applyVMDAtFrame(animTime * VMD_FPS);
    const cur = Math.floor(animTime), max = Math.floor(maxTime);
    timeDisplay.textContent = `${Math.floor(cur/60)}:${String(cur%60).padStart(2,'0')} / ${Math.floor(max/60)}:${String(max%60).padStart(2,'0')}`;
  }
  if (vrm) vrm.update(dt);
  controls.update();
  renderer.render(scene, camera);
}

// ─── Play Button ──────────────────────────────────────

btnPlay.addEventListener('click', async () => {
  if (audioCtx && audioCtx.state === 'suspended') await audioCtx.resume();
  if (isPlaying) {
    isPlaying = false;
    if (sourceNode) { try { sourceNode.stop(); } catch(e) {} sourceNode = null; }
    btnPlay.textContent = '▶';
  } else {
    startPlayback();
  }
});

// ─── Resize ───────────────────────────────────────────

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Init ─────────────────────────────────────────────

async function init() {
  try {
    await loadVRM();
    await loadVMD();
    setupAnimation();
    await loadAudio();
    animate();
    // Auto-start
    setTimeout(startPlayback, 1500);
  } catch (err) {
    statusText.textContent = '❌ 加载失败: ' + err.message;
    console.error(err);
  }
}

init();
</script>
</body>
</html>
