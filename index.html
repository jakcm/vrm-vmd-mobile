<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>VRM + VMD Dance</title>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.176.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.176.0/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3/lib/three-vrm.module.min.js"
  }
}
</script>

<style>
* { -webkit-tap-highlight-color: transparent; }
body { margin:0; overflow:hidden; user-select:none; -webkit-user-select:none; font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background:#1a1a2e; color:#fff; }
canvas { touch-action:none; display:block; }

#loading { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#1a1a2e; z-index:100; transition:opacity .5s; }
#loading.hidden { opacity:0; pointer-events:none; }
#loading h1 { font-size:24px; margin-bottom:24px; background:linear-gradient(135deg,#e94560,#0f3460); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.loader-bar { width:280px; height:4px; background:#16213e; border-radius:2px; overflow:hidden; }
.loader-bar .fill { height:100%; width:0%; background:linear-gradient(90deg,#e94560,#0f3460); border-radius:2px; transition:width .3s; }
#loading p { margin-top:12px; font-size:13px; color:#888; }

#controls { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); display:flex; gap:12px; align-items:center; z-index:50; background:rgba(0,0,0,.5); backdrop-filter:blur(10px); padding:10px 20px; border-radius:30px; border:1px solid rgba(255,255,255,.1); }
#controls button { width:44px; height:44px; border-radius:50%; border:1px solid rgba(255,255,255,.2); background:rgba(255,255,255,.08); color:#fff; font-size:20px; cursor:pointer; transition:all .2s; display:flex; align-items:center; justify-content:center; }
#controls button:hover { background:rgba(255,255,255,.2); }
#controls button:active { transform:scale(.9); }
#controls .time { font-size:12px; color:#aaa; min-width:80px; text-align:center; font-variant-numeric:tabular-nums; }
#info { position:fixed; top:12px; left:50%; transform:translateX(-50%); z-index:50; background:rgba(0,0,0,.4); backdrop-filter:blur(8px); padding:6px 16px; border-radius:20px; font-size:12px; color:#ccc; white-space:nowrap; border:1px solid rgba(255,255,255,.06); pointer-events:none; }
</style>
</head>
<body>

<div id="loading">
  <h1>🎵 VRM + VMD Dance</h1>
  <div class="loader-bar"><div class="fill" id="progress-fill"></div></div>
  <p id="status-text">加载中...</p>
</div>
<div id="info">🐱 猫女郎 · 酒醉的蝴蝶</div>
<div id="controls">
  <button id="btnPlay" title="播放/暂停">▶</button>
  <div class="time" id="timeDisplay">0:00 / 0:00</div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import * as THREEVRM from '@pixiv/three-vrm';

// ═══════════════════════════════════════════════════════════
// VMD Binary Parser (pure JS, no MMDLoader dependency)
// ═══════════════════════════════════════════════════════════

function parseVMD(arrayBuffer) {
  const dv = new DataView(arrayBuffer);
  let offset = 0;

  // Header: 30 bytes + padding
  const headerStr = '';
  offset += 30;

  // Bone motions count
  const boneCount = dv.getUint32(offset, true); offset += 4;

  const bones = [];
  for (let i = 0; i < boneCount; i++) {
    // Bone name: 15 bytes Shift-JIS (treat as raw bytes, convert to string)
    const nameBytes = [];
    for (let j = 0; j < 15; j++) {
      const b = dv.getUint8(offset + j);
      if (b === 0) break;
      nameBytes.push(b);
    }
    const name = new TextDecoder('shift-jis').decode(new Uint8Array(nameBytes));
    offset += 15;

    const frame = dv.getUint32(offset, true); offset += 4;

    // Position: vec3 float32
    const px = dv.getFloat32(offset, true); offset += 4;
    const py = dv.getFloat32(offset, true); offset += 4;
    const pz = dv.getFloat32(offset, true); offset += 4;

    // Rotation: quat float32 (x, y, z, w)
    const rx = dv.getFloat32(offset, true); offset += 4;
    const ry = dv.getFloat32(offset, true); offset += 4;
    const rz = dv.getFloat32(offset, true); offset += 4;
    const rw = dv.getFloat32(offset, true); offset += 4;

    // Interpolation: 64 bytes (4 curves x 4 control points x 4 bytes)
    // We store the raw bytes for Bezier curve interpolation
    const interpolation = [];
    for (let j = 0; j < 64; j++) {
      interpolation.push(dv.getUint8(offset + j));
    }
    offset += 64;

    bones.push({
      name,
      frame,
      position: [px, py, pz],
      rotation: [rx, ry, rz, rw],
      interpolation,
    });
  }

  // Morph count
  const morphCount = dv.getUint32(offset, true); offset += 4;

  const morphs = [];
  for (let i = 0; i < morphCount; i++) {
    const nameBytes = [];
    for (let j = 0; j < 15; j++) {
      const b = dv.getUint8(offset + j);
      if (b === 0) break;
      nameBytes.push(b);
    }
    const name = new TextDecoder('shift-jis').decode(new Uint8Array(nameBytes));
    offset += 15;

    const frame = dv.getUint32(offset, true); offset += 4;
    const weight = dv.getFloat32(offset, true); offset += 4;

    morphs.push({ name, frame, weight });
  }

  return { bones, morphs };
}

// Shift-JIS decoder polyfill for browsers that don't support it
if (typeof TextDecoder === 'function') {
  try { new TextDecoder('shift-jis'); } catch(e) {
    // fallback: replace common VMD char codes
    const origDecode = TextDecoder.prototype.decode;
    // keep as-is, modern browsers support shift-jis
  }
}

// ─── Patch MToon shader (getShadow compat with r176) ──
function patchShaderMaterial(mat) {
  if (!mat || mat._shadowPatched) return;
  const origCb = mat.onBeforeCompile;
  mat.onBeforeCompile = function(shader) {
    if (origCb) origCb.call(this, shader);
    shader.fragmentShader = shader.fragmentShader.replace(
      /getShadow\s*\([^)]+\)\s*/g,
      '1.0'
    );
  };
  mat._shadowPatched = true;
}

// ─── Config ──────────────────────────────────────────
const VMD_FPS = 30;
const cfg = {
  modelPath: './models/猫女郎.vrm',
  vmdPaths: ['./vmd/兰若酒醉的蝴蝶mmd数据.vmd'],
  audioPath: './audio/酒醉的蝴蝶音频.wav',
};

// ─── DOM ─────────────────────────────────────────────
const loadingEl = document.getElementById('loading');
const progressFill = document.getElementById('progress-fill');
const statusText = document.getElementById('status-text');
const btnPlay = document.getElementById('btnPlay');
const timeDisplay = document.getElementById('timeDisplay');

function setProgress(pct, msg) {
  progressFill.style.width = Math.min(pct, 100) + '%';
  if (msg) statusText.textContent = msg;
}

// ─── Bone Mapping (SystemAnimatorOnline) ──────────────
const boneMapMMDToVRM = {
  'センター': 'hips', '上半身': 'spine', '上半身2': 'chest', '上半身3': 'upperChest',
  '首': 'neck', '頭': 'head',
  '右肩': 'rightShoulder', '右腕': 'rightUpperArm', '右ひじ': 'rightLowerArm', '右手首': 'rightHand',
  '右親指０': 'rightThumbMetacarpal', '右親指１': 'rightThumbProximal', '右親指２': 'rightThumbDistal',
  '右小指１': 'rightLittleProximal', '右小指２': 'rightLittleIntermediate', '右小指３': 'rightLittleDistal',
  '右薬指１': 'rightRingProximal', '右薬指２': 'rightRingIntermediate', '右薬指３': 'rightRingDistal',
  '右中指１': 'rightMiddleProximal', '右中指２': 'rightMiddleIntermediate', '右中指３': 'rightMiddleDistal',
  '右人指１': 'rightIndexProximal', '右人指２': 'rightIndexIntermediate', '右人指３': 'rightIndexDistal',
  '左肩': 'leftShoulder', '左腕': 'leftUpperArm', '左ひじ': 'leftLowerArm', '左手首': 'leftHand',
  '左親指０': 'leftThumbMetacarpal', '左親指１': 'leftThumbProximal', '左親指２': 'leftThumbDistal',
  '左小指１': 'leftLittleProximal', '左小指２': 'leftLittleIntermediate', '左小指３': 'leftLittleDistal',
  '左薬指１': 'leftRingProximal', '左薬指２': 'leftRingIntermediate', '左薬指３': 'leftRingDistal',
  '左中指１': 'leftMiddleProximal', '左中指２': 'leftMiddleIntermediate', '左中指３': 'leftMiddleDistal',
  '左人指１': 'leftIndexProximal', '左人指２': 'leftIndexIntermediate', '左人指３': 'leftIndexDistal',
  '右目': 'rightEye', '左目': 'leftEye',
  '右足': 'rightUpperLeg', '右ひざ': 'rightLowerLeg', '右足首': 'rightFoot', '右足先EX': 'rightToes',
  '左足': 'leftUpperLeg', '左ひざ': 'leftLowerLeg', '左足首': 'leftFoot', '左足先EX': 'leftToes',
};

// ─── Scene Setup (vrm-viewer-mobile style) ────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.prepend(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

scene.add(new THREE.AmbientLight(0xffffff, 1.0));
const dirLight = new THREE.DirectionalLight(0xffffff, 3.0);
dirLight.position.set(1, 1, 1).normalize();
scene.add(dirLight);
const fill1 = new THREE.DirectionalLight(0x8888ff, 0.5);
fill1.position.set(-1, 0.5, -1).normalize();
scene.add(fill1);
const fill2 = new THREE.DirectionalLight(0xff8888, 0.3);
fill2.position.set(0, -1, 0.5).normalize();
scene.add(fill2);

const grid = new THREE.GridHelper(10, 10, 0x444466, 0x333355);
grid.position.y = 0;
scene.add(grid);

const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20);
camera.position.set(0, 1, 5);
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.0, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.screenSpacePanning = true;
controls.touches = { ONE: THREE.TOUCH.ROTATE, TWO: THREE.TOUCH.DOLLY_PAN };
controls.update();

// ─── VRM Load (vrm-viewer-mobile approach) ───────────
let vrm = null;
let vrmScene = null;

async function loadVRM() {
  setProgress(10, '加载 VRM 模型...');
  const loader = new GLTFLoader();
  loader.register(parser => new THREEVRM.VRMLoaderPlugin(parser));

  const gltf = await new Promise((resolve, reject) => {
    loader.load(cfg.modelPath, resolve, xhr => {
      setProgress(10 + (xhr.loaded / xhr.total) * 40, `加载 VRM... ${Math.round(xhr.loaded/1024)}KB`);
    }, reject);
  });

  vrm = gltf.userData.vrm;
  vrmScene = gltf.scene;

  THREEVRM.VRMUtils.removeUnnecessaryVertices(vrmScene);

  // Patch ShaderMaterials
  vrmScene.traverse(child => {
    if (!child.isMesh) return;
    child.frustumCulled = false;
    const mats = Array.isArray(child.material) ? child.material : [child.material];
    mats.forEach(patchShaderMaterial);
  });

  // Normalize height
  const box = new THREE.Box3().setFromObject(vrmScene);
  const size = box.getSize(new THREE.Vector3());
  const scale = 1.6 / Math.max(size.x, size.y, size.z);
  vrmScene.scale.set(scale, scale, scale);
  vrmScene.position.y = 0;
  vrmScene.rotation.y = Math.PI;

  scene.add(vrmScene);
  vrm.update(0);
  setProgress(55, 'VRM 加载完成');
}

// ─── VMD Load (pure JS parser) ────────────────────────
let vmdData = null;

async function loadVMD() {
  setProgress(55, '加载 VMD 动作...');
  const resp = await fetch(cfg.vmdPaths[0]);
  const ab = await resp.arrayBuffer();
  const parsed = parseVMD(ab);

  // Build bone tracks
  const boneTracks = {};
  parsed.bones.forEach(kf => {
    if (!boneTracks[kf.name]) boneTracks[kf.name] = [];
    boneTracks[kf.name].push(kf);
  });
  Object.values(boneTracks).forEach(t => t.sort((a, b) => a.frame - b.frame));
  vmdData = { _boneTracks: boneTracks };

  // Build morph tracks
  const morphTracks = {};
  parsed.morphs.forEach(kf => {
    if (!morphTracks[kf.name]) morphTracks[kf.name] = [];
    morphTracks[kf.name].push(kf);
  });
  Object.values(morphTracks).forEach(t => t.sort((a, b) => a.frame - b.frame));
  vmdData._morphTracks = morphTracks;

  // Total frames
  vmdData.totalFrames = 0;
  parsed.bones.forEach(kf => { if (kf.frame > vmdData.totalFrames) vmdData.totalFrames = kf.frame; });
  parsed.morphs.forEach(kf => { if (kf.frame > vmdData.totalFrames) vmdData.totalFrames = kf.frame; });

  setProgress(85, 'VMD 加载完成');
}

// ─── Audio Load ───────────────────────────────────────
let audioCtx = null, audioBuffer = null, sourceNode = null, gainNode = null;
let isAudioReady = false;

async function loadAudio() {
  setProgress(85, '加载音频...');
  const resp = await fetch(cfg.audioPath);
  const ab = await resp.arrayBuffer();
  audioCtx = new AudioContext();
  audioBuffer = await audioCtx.decodeAudioData(ab);
  gainNode = audioCtx.createGain();
  gainNode.gain.value = 0.7;
  gainNode.connect(audioCtx.destination);
  isAudioReady = true;
  setProgress(100, '加载完成 ✓');
  setTimeout(() => loadingEl.classList.add('hidden'), 500);
}

// ─── Animation System (SystemAnimatorOnline approach) ─
const _q0 = new THREE.Quaternion(), _q1 = new THREE.Quaternion(), _v3 = new THREE.Vector3();
let animBones = [];
let isPlaying = false;
let animTime = 0;
const clock = new THREE.Clock();

// Extract Bezier control points from VMD interpolation bytes
function getBezierCP(curve, idx) {
  const base = idx * 4;
  return {
    x1: curve[base] / 127, y1: curve[base + 1] / 127,
    x2: curve[base + 2] / 127, y2: curve[base + 3] / 127,
  };
}

function interpolateVMD(curve, t) {
  if (t <= 0) return 0;
  if (t >= 1) return 1;
  const cp = getBezierCP(curve, 0);
  let guess = t;
  for (let i = 0; i < 12; i++) {
    const omg = 1 - guess;
    const bx = 3 * omg * omg * guess * cp.x1 + 3 * omg * guess * guess * cp.x2 + guess * guess * guess;
    const dbx = 3 * omg * omg * cp.x1 + 6 * omg * guess * (cp.x2 - cp.x1) + 3 * guess * guess * (1 - cp.x2);
    if (Math.abs(bx - t) < 1e-5 || Math.abs(dbx) < 1e-10) break;
    guess = Math.max(0, Math.min(1, guess - (bx - t) / dbx));
  }
  const omg = 1 - guess;
  return Math.max(0, Math.min(1, 3 * omg * omg * guess * cp.y1 + 3 * omg * guess * guess * cp.y2 + guess * guess * guess));
}

function setupAnimation() {
  if (!vmdData || !vrm) return;
  animBones = [];
  for (const mmdName in boneMapMMDToVRM) {
    const track = vmdData._boneTracks[mmdName];
    if (!track || track.length === 0) continue;
    const vrmName = boneMapMMDToVRM[mmdName];
    let bn;
    try { bn = vrm.humanoid?.getNormalizedBoneNode?.(vrmName); } catch (e) {}
    if (!bn) continue;
    animBones.push({ track, isRoot: mmdName === 'センター', boneNode: bn });
  }
}

function applyVMDAtFrame(frame) {
  if (!vrm || !vmdData || animBones.length === 0) return;
  animBones.forEach(({ track, isRoot, boneNode }) => {
    const len = track.length;
    if (frame <= track[0].frame) {
      const kf = track[0];
      boneNode.quaternion.set(kf.rotation[0], kf.rotation[1], kf.rotation[2], kf.rotation[3]);
      if (isRoot) boneNode.position.set(-kf.position[0], kf.position[1], kf.position[2]);
      return;
    }
    if (frame >= track[len - 1].frame) {
      const kf = track[len - 1];
      boneNode.quaternion.set(kf.rotation[0], kf.rotation[1], kf.rotation[2], kf.rotation[3]);
      if (isRoot) boneNode.position.set(-kf.position[0], kf.position[1], kf.position[2]);
      return;
    }
    let lo = 0, hi = len - 1;
    while (hi - lo > 1) { const m = (lo + hi) >> 1; if (track[m].frame <= frame) lo = m; else hi = m; }
    const kf0 = track[lo], kf1 = track[hi];
    const frameDiff = kf1.frame - kf0.frame;
    const t = (frame - kf0.frame) / frameDiff;
    const interp = interpolateVMD(kf0.interpolation, t);

    _q0.set(kf0.rotation[0], kf0.rotation[1], kf0.rotation[2], kf0.rotation[3]);
    _q1.set(kf1.rotation[0], kf1.rotation[1], kf1.rotation[2], kf1.rotation[3]);
    const cos = _q0.x * _q1.x + _q0.y * _q1.y + _q0.z * _q1.z + _q0.w * _q1.w;
    if (cos < 0) { _q1.x = -_q1.x; _q1.y = -_q1.y; _q1.z = -_q1.z; _q1.w = -_q1.w; }
    _q0.slerp(_q1, interp);
    boneNode.quaternion.copy(_q0);

    if (isRoot) {
      _v3.set(-kf0.position[0], kf0.position[1], kf0.position[2])
        .lerp(new THREE.Vector3(-kf1.position[0], kf1.position[1], kf1.position[2]), interp);
      boneNode.position.copy(_v3);
    }
  });
}

// ─── Playback ─────────────────────────────────────────
function startPlayback() {
  if (!vmdData || !vrm) return;
  clock.start();
  animTime = 0;
  isPlaying = true;
  if (isAudioReady && audioBuffer) {
    sourceNode = audioCtx.createBufferSource();
    sourceNode.buffer = audioBuffer;
    sourceNode.connect(gainNode);
    sourceNode.start(0);
  }
  btnPlay.textContent = '⏸';
}

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  if (isPlaying && vmdData) {
    animTime += dt;
    const maxTime = vmdData.totalFrames / VMD_FPS;
    if (animTime >= maxTime) {
      animTime = 0;
      if (sourceNode) { try { sourceNode.stop(); } catch(e) {} sourceNode = null; }
      if (isAudioReady && audioBuffer) {
        sourceNode = audioCtx.createBufferSource();
        sourceNode.buffer = audioBuffer;
        sourceNode.connect(gainNode);
        sourceNode.start(0);
      }
    }
    applyVMDAtFrame(animTime * VMD_FPS);
    const cur = Math.floor(animTime), max = Math.floor(maxTime);
    timeDisplay.textContent = `${Math.floor(cur/60)}:${String(cur%60).padStart(2,'0')} / ${Math.floor(max/60)}:${String(max%60).padStart(2,'0')}`;
  }
  if (vrm) vrm.update(dt);
  controls.update();
  renderer.render(scene, camera);
}

// ─── Play Button ──────────────────────────────────────
btnPlay.addEventListener('click', async () => {
  if (audioCtx && audioCtx.state === 'suspended') await audioCtx.resume();
  if (isPlaying) {
    isPlaying = false;
    if (sourceNode) { try { sourceNode.stop(); } catch(e) {} sourceNode = null; }
    btnPlay.textContent = '▶';
  } else {
    startPlayback();
  }
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Init ─────────────────────────────────────────────
async function init() {
  try {
    await loadVRM();
    await loadVMD();
    setupAnimation();
    await loadAudio();
    animate();
    setTimeout(startPlayback, 1500);
  } catch (err) {
    statusText.textContent = '❌ 加载失败: ' + err.message;
    console.error(err);
  }
}
init();
</script>
</body>
</html>
