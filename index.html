// ─── Scene Setup ─────────────────────────────────────────

// ─── VRM Load ────────────────────────────────────────────

let vrm = null;
let vrmScene = null;
let currentHelper = null;

async function loadVRM() {
  setProgress(10, '加载 VRM 模型...');

  const loader = new GLTFLoader();
  loader.register((parser) => new THREEVRM.VRMLoaderPlugin(parser));

  const gltf = await new Promise((resolve, reject) => {
    loader.load(cfg.modelPath, resolve, (xhr) => {
      const pct = 10 + (xhr.loaded / xhr.total) * 40;
      setProgress(pct, `加载 VRM 模型... ${Math.round(xhr.loaded / 1024)}KB`);
    }, reject);
  });

  vrm = gltf.userData.vrm;
  vrmScene = gltf.scene;

  // Scale to fit
  const box = new THREE.Box3().setFromObject(vrmScene);
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const targetHeight = 1.6;
  const scale = targetHeight / maxDim;
  vrmScene.scale.set(scale, scale, scale);

  vrmScene.position.y = 0;
  vrmScene.traverse((child) => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });

  scene.add(vrmScene);

  // Update VRM
  vrm.update(0);

  // Debug: check scene
  let meshCount = 0;
  vrmScene.traverse(c => { if (c.isMesh) meshCount++; });
  console.log(`[DEBUG] VRM loaded: ${meshCount} meshes, children: ${vrmScene.children.length}`);
  console.log(`[DEBUG] VRM scene scale:`, vrmScene.scale);
  console.log(`[DEBUG] VRM meta:`, vrm.meta);
  console.log(`[DEBUG] VRM humanoid bones:`, Object.keys(vrm.humanoid?.humanBones || {}).join(', '));

  setProgress(55, `VRM 模型加载完成 (${meshCount} 网格)`);
}

// ─── VMD Load & Parse ────────────────────────────────────

let vmdData = null; // { bones: [], morphs: [], totalFrames: 0 }

async function loadVMD() {
  setProgress(55, '加载 VMD 动作数据...');

  const loader = new MMDLoader();
  const url = cfg.vmdPaths[0];

  vmdData = await new Promise((resolve, reject) => {
    loader.loadVMD(url, resolve, (xhr) => {
      const pct = 55 + (xhr.loaded / xhr.total) * 25;
      setProgress(pct, `加载 VMD 动作... ${Math.round(xhr.loaded / 1024)}KB`);
    }, reject);
  });

  // Sort keyframes by bone name and frame number
  const boneTracks = {};
  if (vmdData.bones) {
    vmdData.bones.forEach(kf => {
      if (!boneTracks[kf.name]) boneTracks[kf.name] = [];
      boneTracks[kf.name].push(kf);
    });
    Object.values(boneTracks).forEach(track => track.sort((a, b) => a.frame - b.frame));
  }
  vmdData._boneTracks = boneTracks;

  // Same for morphs
  const morphTracks = {};
  if (vmdData.morphs) {
    vmdData.morphs.forEach(kf => {
      if (!morphTracks[kf.name]) morphTracks[kf.name] = [];
      morphTracks[kf.name].push(kf);
    });
    Object.values(morphTracks).forEach(track => track.sort((a, b) => a.frame - b.frame));
  }
  vmdData._morphTracks = morphTracks;

  // Calculate total duration
  let maxFrame = 0;
  if (vmdData.bones) {
    vmdData.bones.forEach(kf => { if (kf.frame > maxFrame) maxFrame = kf.frame; });
  }
  if (vmdData.morphs) {
    vmdData.morphs.forEach(kf => { if (kf.frame > maxFrame) maxFrame = kf.frame; });
  }
  vmdData.totalFrames = maxFrame;

  setProgress(85, `VMD 加载完成 (${vmdData.bones?.length || 0} 骨骼关键帧, ${vmdData.totalFrames} 帧)`);
}

// ─── VMD Cubic Bezier Interpolation ──────────────────────

/**
 * VMD interpolation: 24 bytes, 4 curves (x, y, z, rotation).
 * Each curve: [x1, y1, x2, y2] where values are 0-127, mapped to 0-1.
 */
function interpolateVMD(curve, time, kf0, kf1) {
  if (!kf0 && !kf1) return 0;
  if (!kf1) return 1;
  if (!kf0) return 0;

  const frameDiff = kf1.frame - kf0.frame;
  if (frameDiff <= 0) return 1;

  // t is the raw linear ratio between the two keyframes
  const t = (time - kf0.frame) / frameDiff;
  if (t <= 0) return 0;
  if (t >= 1) return 1;

  // Extract bezier control points for this axis
  const idxMap = [0, 4, 8, 12]; // curve offset in interpolation array for X, Y, Z, rotation
  const axis = 0; // We interpolate time uniformly using the X curve
  const base = idxMap[axis];
  const cpx1 = curve[base] / 127; // cx1
  const cpy1 = curve[base + 1] / 127; // cy1
  const cpx2 = curve[base + 2] / 127; // cx2
  const cpy2 = curve[base + 3] / 127; // cy2

  // Solve for t_bezier where Bx(t_bezier) = input_t using Newton's method
  // B(t) = 3(1-t)²*t*P1 + 3(1-t)*t²*P2 + t³
  // Bx(t) = 3(1-t)²*t*cpx1 + 3(1-t)*t²*cpx2 + t³

  let guess = t;
  for (let i = 0; i < 8; i++) {
    const t2 = guess * guess;
    const t3 = t2 * guess;
    const omt = 1 - guess;
    const omt2 = omt * omt;
    // Bx
    const bx = 3 * omt2 * guess * cpx1 + 3 * omt * t2 * cpx2 + t3;
    // dBx/dt
    const dbx = 3 * (omt2 - 2 * omt * guess) * cpx1 + 3 * (2 * omt * guess - t2) * cpx2 + 3 * t2;

    if (Math.abs(bx - t) < 1e-5) break;
    if (Math.abs(dbx) < 1e-10) break;

    guess = guess - (bx - t) / dbx;
    guess = Math.max(0, Math.min(1, guess));
  }

  // Evaluate By at the found t_bezier
  const g2 = guess * guess;
  const g3 = g2 * guess;
  const omg = 1 - guess;
  const omg2 = omg * omg;
  const by = 3 * omg2 * guess * cpy1 + 3 * omg * g2 * cpy2 + g3;

  return Math.max(0, Math.min(1, by));
}

// ─── Quaternion Slerp ─────────────────────────────────────

function slerp(qa, qb, t) {
  const qm = new THREE.Quaternion();
  let cosHalfTheta = qa.x * qb.x + qa.y * qb.y + qa.z * qb.z + qa.w * qb.w;
  if (cosHalfTheta < 0) {
    qb = qb.clone().negate();
    cosHalfTheta = -cosHalfTheta;
  }
  if (Math.abs(cosHalfTheta) >= 0.999) {
    qm.x = qa.x; qm.y = qa.y; qm.z = qa.z; qm.w = qa.w;
    return qm;
  }
  const halfTheta = Math.acos(cosHalfTheta);
  const sinHalfTheta = Math.sqrt(1 - cosHalfTheta * cosHalfTheta);
  if (Math.abs(sinHalfTheta) < 0.001) {
    qm.x = (qa.x + qb.x) * 0.5;
    qm.y = (qa.y + qb.y) * 0.5;
    qm.z = (qa.z + qb.z) * 0.5;
    qm.w = (qa.w + qb.w) * 0.5;
    return qm;
  }
  const a = Math.sin((1 - t) * halfTheta) / sinHalfTheta;
  const b = Math.sin(t * halfTheta) / sinHalfTheta;
  qm.x = qa.x * a + qb.x * b;
  qm.y = qa.y * a + qb.y * b;
  qm.z = qa.z * a + qb.z * b;
  qm.w = qa.w * a + qb.w * b;
  return qm;
}

// ─── Animation State ─────────────────────────────────────

const clock = new THREE.Clock();
let isPlaying = false;
let animTime = 0; // in seconds

// Pre-compute: for each MMD bone name that maps to VRM, store the track data
let animBones = []; // [{ mmdName, vrmName, track, isRoot }]

function setupAnimationTracks() {
  if (!vmdData || !vrm) return;

  // Check VRM version
  const isVRM1 = vrm.meta && parseInt(vrm.meta.metaVersion) > 0;
  const morphMap = isVRM1 ? morphMapMMDToVRM1 : morphMapMMDToVRM0;

  console.log(`[DEBUG] VRM version: ${isVRM1 ? '1.x' : '0.x'}`);

  animBones = [];
  for (const mmdName in boneMapMMDToVRM) {
    const track = vmdData._boneTracks[mmdName];
    if (!track || track.length === 0) continue;
    const vrmName = boneMapMMDToVRM[mmdName];
    // Check if VRM has this bone
    let boneNode;
    try {
      boneNode = vrm.humanoid?.getNormalizedBoneNode?.(vrmName) || vrm.humanoid?.getBoneNode?.(vrmName);
    } catch (e) { /* skip */ }
    if (!boneNode) continue;
    animBones.push({
      mmdName,
      vrmName,
      track,
      isRoot: mmdName === 'センター',
      boneNode,
    });
  }

  console.log(`[DEBUG] Mapped ${animBones.length} bones:`);
  animBones.forEach(b => console.log(`  ${b.mmdName} → ${b.vrmName} (${b.track.length} keyframes)`));

  // Log unmapped VMD bones
  for (const mmdName in vmdData._boneTracks) {
    if (!boneMapMMDToVRM[mmdName]) {
      console.warn(`[DEBUG] Unmapped VMD bone: "${mmdName}"`);
    }
  }

  // Morph mapping
  animMorphs = [];
  for (const mmdName in morphMap) {
    const track = vmdData._morphTracks[mmdName];
    if (!track || track.length === 0) continue;
    const vrmName = morphMap[mmdName];
    animMorphs.push({ mmdName, vrmName, track });
  }
  console.log(`[DEBUG] Mapped ${animMorphs.length} morphs`);
}
let animMorphs = [];

// ─── Apply Frame ──────────────────────────────────────────

const _q0 = new THREE.Quaternion();
const _q1 = new THREE.Quaternion();
const _euler = new THREE.Euler();
const _v3 = new THREE.Vector3();

function applyVMDAtFrame(frame) {
  if (!vrm || !vmdData) {
    //console.log('[DEBUG] applyVMDAtFrame skipped: no vrm or vmdData');
    return;
  }

  // Debug first frame
  const frameInt = Math.floor(frame);
  if (frameInt % 300 === 0 || animBones.length === 0) {
    console.log(`[DEBUG] applyVMDAtFrame frame=${frame.toFixed(1)}, animBones=${animBones.length}, animMorphs=${animMorphs.length}`);
  }

  // Apply bone transforms
  animBones.forEach(({ mmdName, vrmName, track, isRoot, boneNode }) => {
    if (!boneNode) return;

    // Find adjacent keyframes
    const length = track.length;
    if (frame < track[0].frame) {
      // Before first keyframe: use first keyframe's transform
      const kf = track[0];
      boneNode.quaternion.fromArray(kf.rotation);
      if (isRoot) boneNode.position.fromArray(kf.position);
      return;
    }
    if (frame >= track[length - 1].frame) {
      const kf = track[length - 1];
      boneNode.quaternion.fromArray(kf.rotation);
      if (isRoot) {
        const pos = kf.position;
        boneNode.position.set(-pos[0], pos[1], pos[2]);
      }
      return;
    }

    // Binary search for adjacent keyframes
    let lo = 0, hi = length - 1;
    while (hi - lo > 1) {
      const mid = (lo + hi) >> 1;
      if (track[mid].frame <= frame) lo = mid;
      else hi = mid;
    }
    const kf0 = track[lo];
    const kf1 = track[hi];

    // Interpolation factor with cubic bezier
    const interp = interpolateVMD(kf0.interpolation, frame, kf0, kf1);

    // Interpolate rotation (slerp)
    _q0.fromArray(kf0.rotation);
    _q1.fromArray(kf1.rotation);
    const q = slerp(_q0, _q1, interp);
    boneNode.quaternion.copy(q);

    // Position (only for root/center bone)
    if (isRoot) {
      // VMD センター position: x=left/right, y=up/down, z=forward/back
      // Three.js: x=right, y=up, z=negative forward
      _v3.lerpVectors(
        new THREE.Vector3(-kf0.position[0], kf0.position[1], kf0.position[2]),
        new THREE.Vector3(-kf1.position[0], kf1.position[1], kf1.position[2]),
        interp
      );
      boneNode.position.copy(_v3);
    }
  });

  // Apply morphs (blendshapes)
  const exprMgr = vrm.expressionManager || vrm.blendShapeProxy;
  if (exprMgr) {
    // Reset all expression weights
    const presetNames = ['aa','ih','ou','ee','oh','blink','blinkLeft','blinkRight',
      'relaxed','sad','angry','happy','a','i','u','e','o','blink_l','blink_r',
      'fun','sorrow','joy'];
    presetNames.forEach(name => {
      try { exprMgr.setValue(name, 0); } catch (e) {}
    });

    // Apply VMD morphs
    animMorphs.forEach(({ track, vrmName }) => {
      const length = track.length;
      if (frame < track[0].frame) {
        exprMgr.setValue(vrmName, track[0].weight);
        return;
      }
      if (frame >= track[length - 1].frame) {
        exprMgr.setValue(vrmName, track[length - 1].weight);
        return;
      }

      let lo = 0, hi = length - 1;
      while (hi - lo > 1) {
        const mid = (lo + hi) >> 1;
        if (track[mid].frame <= frame) lo = mid;
        else hi = mid;
      }
      const kf0 = track[lo], kf1 = track[hi];
      const interp = (kf1.frame === kf0.frame) ? 0 : (frame - kf0.frame) / (kf1.frame - kf0.frame);
      const weight = kf0.weight + (kf1.weight - kf0.weight) * interp;
      exprMgr.setValue(vrmName, Math.max(0, Math.min(1, weight)));
    });
  }
}

// ─── Playback ─────────────────────────────────────────────

let lastAnimFrame = -1;

function startPlayback() {
  if (!vmdData || !vrm) return;
  clock.start();
  animTime = 0;
  lastAnimFrame = -1;
  isPlaying = true;

  // Audio
  if (isAudioInitialized && audioBuffer && !sourceNode) {
    sourceNode = audioCtx.createBufferSource();
    sourceNode.buffer = audioBuffer;
    sourceNode.connect(gainNode);
    sourceNode.start(0);
    audioStartTime = audioCtx.currentTime;
    audioPauseOffset = 0;
  }

  btnPlay.textContent = '⏸';
}

function pausePlayback() {
  isPlaying = false;
  if (sourceNode) {
    audioPauseOffset = audioCtx.currentTime - audioStartTime;
    try { sourceNode.stop(); } catch (e) {}
    sourceNode = null;
  }
  btnPlay.textContent = '▶';
}

function stopPlayback() {
  isPlaying = false;
  if (sourceNode) {
    try { sourceNode.stop(); } catch (e) {}
    sourceNode = null;
  }
  audioPauseOffset = 0;
  animTime = 0;
  lastAnimFrame = -1;
  btnPlay.textContent = '▶';
}

// ─── Animation Loop ───────────────────────────────────────

function animate() {
  requestAnimationFrame(animate);

  const dt = clock.getDelta();

  if (isPlaying && vmdData) {
    animTime += dt;

    // Limit to VMD duration
    const maxTime = vmdData.totalFrames / VMD_FPS;
    if (animTime >= maxTime) {
      animTime = 0;
      // Reset audio
      if (sourceNode) {
        try { sourceNode.stop(); } catch (e) {}
        sourceNode = null;
      }
      if (isAudioInitialized && audioBuffer) {
        sourceNode = audioCtx.createBufferSource();
        sourceNode.buffer = audioBuffer;
        sourceNode.connect(gainNode);
        sourceNode.start(0);
        audioStartTime = audioCtx.currentTime;
        audioPauseOffset = 0;
      }
    }

    // Compute VMD frame (with fractional part for smooth interpolation)
    const vmdFrame = animTime * VMD_FPS;
    applyVMDAtFrame(vmdFrame);

    // Update UI
    const cur = Math.floor(animTime);
    const max = Math.floor(maxTime);
    timeDisplay.textContent =
      `${Math.floor(cur / 60)}:${String(cur % 60).padStart(2, '0')} / ` +
      `${Math.floor(max / 60)}:${String(max % 60).padStart(2, '0')}`;
  }

  // Update VRM
  if (vrm) vrm.update(dt);

  controls.update();
  renderer.render(scene, camera);
}

// ─── Resize ───────────────────────────────────────────────

window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});

// ─── Play Button ──────────────────────────────────────────

btnPlay.addEventListener('click', async () => {
  if (audioCtx && audioCtx.state === 'suspended') {
    await audioCtx.resume();
  }
  if (isPlaying) {
    pausePlayback();
  } else {
    // If animation ended (looped or stopped), restart from beginning
    if (animTime <= 0 || !sourceNode) {
      startPlayback();
    } else {
      // Resume
      isPlaying = true;
      if (isAudioInitialized && audioBuffer && !sourceNode) {
        sourceNode = audioCtx.createBufferSource();
        sourceNode.buffer = audioBuffer;
        sourceNode.connect(gainNode);
        sourceNode.start(0, audioPauseOffset);
        audioStartTime = audioCtx.currentTime - audioPauseOffset;
      }
      btnPlay.textContent = '⏸';
    }
  }
});

// ─── Drag & Drop (hot-swap VRM/VMD) ───────────────────────

document.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('drag-over'); });
document.addEventListener('dragleave', () => { dropzone.classList.remove('drag-over'); });
document.addEventListener('drop', async (e) => {
  e.preventDefault();
  dropzone.classList.remove('drag-over');
  // File drop handling skipped for mobile focus
});

// ─── Init ─────────────────────────────────────────────────

async function init() {
  try {
    await loadVRM();
    await loadVMD();
    setupAnimationTracks();

    if (animBones.length === 0) {
      console.warn('No mapped bones found! VMD bone names:', Object.keys(vmdData._boneTracks || {}));
    } else {
      console.log(`Mapped ${animBones.length} bones, ${animMorphs.length} morphs`);
    }

    await loadAudio();
    animate();

    // Auto-start after a brief delay
    setTimeout(() => {
      if (!isPlaying) startPlayback();
    }, 1000);
  } catch (err) {
    console.error('Init error:', err);
    statusText.textContent = '❌ 加载失败: ' + err.message;
  }
}

init();
</script>
